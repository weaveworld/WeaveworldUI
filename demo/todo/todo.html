<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WeaveworldUI ToDo</title>
<script src="../../w.min.js"></script>
<link href="../../w.css" rel="stylesheet"/>
<link href="todo.css" rel="stylesheet"/>
<script src="todo.js"></script>
</head>
<body class=w>
  <div id="app">
    <div class="ToDo" w:item>
      <img class="Logo" src="logo.jpg" alt="WeaveworldUI logo"/>
      <h1 class="ToDo-Header">WeaveworldUI To Do</h1>
      <div class="ToDo-Container">
        <div class="ToDo-Content" w:each=list>
          <div class="ToDoItem Item" w:item>
            <p class="ToDoItem-Text" w:text=text>Todo text</p>
            <button type="button" class="ToDoItem-Delete" w:on:click='itemDelete' aria-label="Delete todo">-</button>
          </div>          
          <div class="ToDoItem Item" w:item>
            <p class="ToDoItem-Text">Second Todo text</p>
            <button type="button" class="ToDoItem-Delete" aria-label="Delete todo">-</button>
          </div>          
          <form class="Item" w:item=[newTodo] w:type=Item w:name='itemAdd'>
            <input type="text" class=winput w:name="text"><sup></sup>
            <input type="submit" class="ToDo-Add" name=add value="+">
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

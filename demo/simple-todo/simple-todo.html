<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>WeaveworldUI To Do List</title>
  <script src="../../w.min.js"></script>
  <link href="../../w.css" rel="stylesheet"/>
  <script src="simple-todo.js"></script>
</head>
<body class=w>
  <div class=TodoList w:item>
    <h3><span w:text=data.title>To Do List</span> <sup w:text="({{list.length|'-'}})">(2)</sup></h3>
    <ul w:each=list>
      <li class=Todo w:item>
        <button type=button w:on:click=todoDelete>-</button>
        <span w:text=name>Todo 1</span>
      </li>
      <li w:item>
        <button type=button>-</button>
        <span>Todo 2</span>
      </li>
    </ul>
    <blockquote>
      <form w:name="todoAdd" w:item=[toNew] w:type=Todo>
        <input type=text class=winput w:name=name size=20><sup></sup>
        <button>+</button>
      </form>
    </blockquote>
  </div>
</body>
</html>
